site_name: UnitySVC Customer SDK
site_description: Python SDK and CLI for the UnitySVC customer API
site_author: UnitySVC Team
site_url: https://unitysvc-py.readthedocs.io

repo_name: unitysvc/unitysvc-py
repo_url: https://github.com/unitysvc/unitysvc-py
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            show_source: false
            show_root_heading: true
            show_category_heading: true
            members_order: source
            docstring_style: google
            merge_init_into_class: true
            show_signature_annotations: true
            separate_signature: true

markdown_extensions:
  - admonition
  - codehilite
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true
  - tables
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - "Tutorial: Groups & Services": tutorial-groups-and-services.md
  - CLI Reference: cli-reference.md
  - SDK Guide: sdk-guide.md
  - SDK Reference: sdk-reference.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/unitysvc/unitysvc-py
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/unitysvc-py/

copyright: Copyright &copy; 2026 UnitySVC
